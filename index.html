<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Google</title>
    <link rel="stylesheet" href="style.css">
    <script src="sweetalert2.all.min.js"></script>
</head>
<body>
    <header>
        <img class="imagemGoogle" src="img/logoGoogle.png" alt="">
    </header>
    <main> 
        <div class="container">
            <h1>Login</h1>
            <br> 
            <label for="">Usuário
            <br>
            <input type="text" placeholder="Digite seu usuário" id="inputUsuario">
            <br>
            <label for="">Senha</label>
            <br>
            <input type="password" placeholder="Digite sua senha" id="inputSenha">
            <br><br>
            <button onclick="logar()">Entrar</button>
        </div> 
    </main>
    <footer>
        <p>Entre em contato com o suporte <p>
        <img class="imagemWhatsapp" src="img/whatsapp.png" alt=""></p>
    </footer>
    <script src="script.js"></script>    
</body>
</html>
